<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#18231e">
  <title>Daily Table</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600;700&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="wood-frame">
    <section class="chalkboard" aria-label="Daily Table family board">
      <img class="rings rings-top" src="assets/tree-rings.svg" alt="">
      <img class="rings rings-bottom" src="assets/tree-rings.svg" alt="">

      <header class="masthead">
        <div class="brand">
          <h1>Daily Table</h1>
          <div class="brand-stroke"></div>
          <p id="greeting">Good Evening <span class="heart">♡</span></p>
        </div>
        <div class="date">
          <strong id="weekday">Monday</strong>
          <span id="full-date">July 20, 2026</span>
        </div>
      </header>

      <div class="horizontal-chalk"></div>

      <section class="content-grid">
        <article class="meal panel">
          <h2>Tonight</h2>
          <div id="dinner-tonight" class="dinner">Loading…</div>
          <div class="meal-dots"></div>
          <h3>Tomorrow</h3>
          <div id="dinner-tomorrow" class="tomorrow-meal">—</div>
        </article>

        <article class="focus panel">
          <h2>Focus</h2>
          <ul id="focus-list" class="chalk-list">
            <li>Loading…</li>
          </ul>
        </article>

        <article class="person lori panel">
          <div class="person-heading">
            <h2>Lori</h2>
            <img src="assets/flower.svg" class="name-icon flower" alt="">
          </div>
          <ul id="lori-list" class="chalk-list">
            <li>Loading…</li>
          </ul>
        </article>

        <article class="person darin panel">
          <div class="person-heading">
            <h2>Darin</h2>
            <img src="assets/tractor.svg" class="name-icon tractor" alt="">
          </div>
          <ul id="darin-list" class="chalk-list">
            <li>Loading…</li>
          </ul>
        </article>

        <article class="scripture panel">
          <h2>Scripture</h2>
          <blockquote id="scripture-text">Loading today’s verse…</blockquote>
          <div id="scripture-reference" class="scripture-reference"></div>
        </article>

        <article class="whiteboard panel">
          <h2 id="lower-title">Kitchen Whiteboard</h2>
          <div id="lower-content" class="quote">Loading…</div>
          <div id="lower-credit" class="quote-credit"></div>
        </article>
      </section>

      <img id="piggy" class="piggy" src="assets/pig.svg" alt="A little chalk pig hiding on the board">

      <footer>
        <div class="footer-words">Nourish <span>•</span> Organize <span>•</span> Remember <span>•</span> Grow</div>
        <div id="status" class="status" aria-live="polite"></div>
      </footer>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
